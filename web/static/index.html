<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operant</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <span class="app-title">Operant</span>
      <span id="statusBadge" class="status-badge status-idle">Idle</span>
      <span id="stepCounter" class="step-counter" hidden></span>
    </div>
    <div class="header-right">
      <span id="wsStatusDot" class="ws-dot ws-dot--connecting" title="Connecting..."></span>
      <button id="editRulesBtn" class="edit-rules-btn">Edit Rules</button>
      <button id="stopBtn" class="stop-btn">Emergency Stop</button>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </header>

  <main class="app-main">
    <!-- 左ペイン: LIVEスクリーンショット -->
    <section class="pane pane-screenshot">
      <div class="screenshot-wrapper" id="screenshotWrapper">
        <span class="live-badge" id="liveBadge" hidden>LIVE</span>
        <img
          id="screenshotImg"
          class="screenshot-img"
          alt="Screenshot"
          title="Click to expand"
        >
        <p id="noScreenshot" class="no-screenshot">No screenshot yet</p>
        <div class="screenshot-toolbar" id="screenshotToolbar" hidden>
          <span id="screenshotTimestamp" class="screenshot-timestamp"></span>
          <button id="downloadScreenshotBtn" class="screenshot-download-btn" title="Download">↓</button>
        </div>
      </div>

      <!-- 拡大モーダル -->
      <div id="screenshotModal" class="modal">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <img id="modalImg" class="modal-img" alt="Screenshot (expanded)">
      </div>
    </section>

    <!-- 右ペイン: チャット -->
    <section class="pane pane-chat">
      <div class="chat-header">
        <span id="chatHeaderTitle" class="chat-header-title">Chat</span>
        <div class="chat-header-actions">
          <button id="saveChatBtn" class="chat-action-btn">Save</button>
          <button id="savedChatsBtn" class="chat-action-btn">Saved Chats</button>
          <button id="clearHistoryBtn" class="clear-history-btn">Clear</button>
        </div>
      </div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-area">
        <textarea
          id="taskInput"
          class="task-input"
          placeholder="Enter your task..."
          rows="3"
        ></textarea>
        <button id="sendBtn" class="send-btn">Send</button>
      </div>
    </section>
  </main>

  <!-- カスタムダイアログ -->
  <div id="customDialog" class="modal">
    <div class="modal-backdrop" id="dialogBackdrop"></div>
    <div class="dialog-panel">
      <p id="dialogMessage" class="dialog-message"></p>
      <div class="dialog-actions">
        <button id="dialogCancelBtn" class="dialog-cancel-btn">Cancel</button>
        <button id="dialogOkBtn" class="dialog-ok-btn">OK</button>
      </div>
    </div>
  </div>

  <!-- 保存チャットモーダル -->
  <div id="savedChatsModal" class="modal">
    <div class="modal-backdrop" id="savedChatsBackdrop"></div>
    <div class="saved-chats-panel">
      <div class="saved-chats-header">
        <span id="savedChatsPanelTitle" class="saved-chats-title">Saved Chats</span>
        <button id="closeSavedChatsBtn" class="saved-chats-close-btn">✕</button>
      </div>
      <div id="savedChatsList" class="saved-chats-list"></div>
    </div>
  </div>

  <!-- OPERANT.md 編集モーダル -->
  <div id="editRulesModal" class="modal">
    <div class="modal-backdrop" id="editRulesBackdrop"></div>
    <div class="edit-rules-panel">
      <div class="edit-rules-header">
        <span id="editRulesPanelTitle" class="edit-rules-title">Edit OPERANT.md</span>
        <button id="closeEditRulesBtn" class="saved-chats-close-btn">✕</button>
      </div>
      <textarea
        id="editRulesTextarea"
        class="edit-rules-textarea"
        placeholder="Enter agent rules..."
        spellcheck="false"
      ></textarea>
      <div class="edit-rules-actions">
        <button id="saveRulesBtn" class="edit-rules-save-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js?v=5" defer></script>
</body>
</html>
